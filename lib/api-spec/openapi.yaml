openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Offera Proposal Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: proposals
    description: Proposal management
  - name: templates
    description: Template management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List all proposals
      responses:
        "200":
          description: List of proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"
    post:
      operationId: createProposal
      tags: [proposals]
      summary: Create a new proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalRequest"
      responses:
        "201":
          description: Created proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get a proposal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProposal
      tags: [proposals]
      summary: Update a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProposalRequest"
      responses:
        "200":
          description: Updated proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProposal
      tags: [proposals]
      summary: Delete a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /proposals/{id}/send:
    post:
      operationId: sendProposal
      tags: [proposals]
      summary: Send a proposal to a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendProposalRequest"
      responses:
        "200":
          description: Sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/public/{slug}:
    get:
      operationId: getPublicProposal
      tags: [proposals]
      summary: Get a proposal by public slug (requires signing token or workspace auth)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Public proposal view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProposalView"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing or invalid access link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proposals/public/{slug}/respond:
    post:
      operationId: respondToProposal
      tags: [proposals]
      summary: Accept or decline a proposal (client action)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondToProposalRequest"
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProposalView"
        "403":
          description: Missing or invalid signing link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Proposal already responded to
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /templates/{id}/copy:
    post:
      operationId: copyTemplate
      tags: [templates]
      summary: Copy a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopyTemplateRequest"
      responses:
        "201":
          description: Copied template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProposalStatus:
      type: string
      enum: [draft, sent, viewed, accepted, declined]

    PricingRow:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        unit:
          type: string
        type:
          type: string
          enum: [one_time, recurring]
        interval:
          type: string
          enum: [monthly, yearly]
        bindingPeriod:
          type: number
        total:
          type: number
      required:
        - id
        - description
        - quantity
        - unitPrice
        - type
        - total

    ContentBlock:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [heading, text, image, pricing, divider]
        content:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            $ref: "#/components/schemas/PricingRow"
        discount:
          type: number
        vatEnabled:
          type: boolean
        imageUrl:
          type: string
        level:
          type: integer
      required:
        - id
        - type

    ProposalSection:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlock"
      required:
        - id
        - title
        - blocks

    ProposalBranding:
      type: object
      properties:
        logoUrl:
          type: string
        accentColor:
          type: string
        font:
          type: string
          enum: [inter, playfair, dm-sans]
        fontPairing:
          type: string
          enum: [modern, klassisk, editorial]
        coverEnabled:
          type: boolean
        coverBackground:
          type: string
        coverHeadline:
          type: string
        coverSubheadline:
          type: string
        logoPosition:
          type: string
          enum: [left, center, right]
        dividerStyle:
          type: string
          enum: [line, space, decorative]
        glassmorphismEnabled:
          type: boolean
          default: false
        vibePreset:
          type: string
          enum: [architectural, editorial, glass, minimal]
          default: architectural
        gradientEnabled:
          type: boolean
          default: false
      required:
        - accentColor

    DocumentDesignSettings:
      type: object
      properties:
        logoUrl:
          type: string
        accentColor:
          type: string
        fontPairing:
          type: string
          enum: [modern, klassisk, editorial]
        coverEnabled:
          type: boolean
        coverBackground:
          type: string
        coverHeadline:
          type: string
        coverSubheadline:
          type: string
        logoPosition:
          type: string
          enum: [left, center, right]
        dividerStyle:
          type: string
          enum: [line, space, decorative]
        glassmorphismEnabled:
          type: boolean
          default: false
        vibePreset:
          type: string
          enum: [architectural, editorial, glass, minimal]
          default: architectural
        gradientEnabled:
          type: boolean
          default: false
      required:
        - accentColor
        - fontPairing
        - coverEnabled
        - coverBackground
        - logoPosition
        - dividerStyle

    TemplateCategory:
      type: string
      enum: [webb, ai-agent, konsult, ovrigt]

    ProposalParty:
      type: object
      properties:
        companyName:
          type: string
        orgNumber:
          type: string
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        postalCode:
          type: string
        city:
          type: string
      required:
        - companyName
        - orgNumber
        - contactName
        - email
        - phone
        - address
        - postalCode
        - city

    ProposalRecipient:
      allOf:
        - $ref: "#/components/schemas/ProposalParty"
        - type: object
          properties:
            kind:
              type: string
              enum: [company, person]
          required:
            - kind

    ProposalParties:
      type: object
      properties:
        sender:
          $ref: "#/components/schemas/ProposalParty"
        recipient:
          $ref: "#/components/schemas/ProposalRecipient"
      required:
        - sender
        - recipient

    ProposalAuditSummary:
      type: object
      properties:
        eventCount:
          type: integer
        lastEventAt:
          type: string
          format: date-time
        lastEventType:
          type: string
      required:
        - eventCount

    Proposal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        clientName:
          type: string
        clientEmail:
          type: string
        status:
          $ref: "#/components/schemas/ProposalStatus"
        totalValue:
          type: number
        publicSlug:
          type: string
        templateId:
          type: integer
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ProposalSection"
        branding:
          $ref: "#/components/schemas/ProposalBranding"
        parties:
          $ref: "#/components/schemas/ProposalParties"
        personalMessage:
          type: string
        signedByName:
          type: string
        signatureInitials:
          type: string
        signatureDataUrl:
          type: string
        signedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        revisionId:
          type: integer
        snapshotHash:
          type: string
        sentAt:
          type: string
          format: date-time
        viewedAt:
          type: string
          format: date-time
        signingRecipientEmail:
          type: string
        resendEmailId:
          type: string
        auditSummary:
          $ref: "#/components/schemas/ProposalAuditSummary"
      required:
        - id
        - title
        - clientName
        - status
        - totalValue
        - publicSlug
        - sections
        - branding
        - parties
        - createdAt
        - updatedAt

    PublicProposalView:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        clientName:
          type: string
        clientEmail:
          type: string
        tokenRequired:
          type: boolean
        status:
          $ref: "#/components/schemas/ProposalStatus"
        totalValue:
          type: number
        publicSlug:
          type: string
        templateId:
          type: integer
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ProposalSection"
        branding:
          $ref: "#/components/schemas/ProposalBranding"
        parties:
          type: object
          properties:
            sender:
              $ref: "#/components/schemas/ProposalParty"
            recipient:
              $ref: "#/components/schemas/ProposalRecipient"
          required:
            - sender
        personalMessage:
          type: string
        signedByName:
          type: string
        signatureInitials:
          type: string
        signatureDataUrl:
          type: string
        signedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - status
        - totalValue
        - publicSlug
        - sections
        - branding
        - parties
        - createdAt
        - updatedAt

    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/TemplateCategory"
        designSettings:
          $ref: "#/components/schemas/DocumentDesignSettings"
        isBuiltIn:
          type: boolean
        usageCount:
          type: integer
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ProposalSection"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - designSettings
        - isBuiltIn
        - usageCount
        - sections
        - createdAt
        - updatedAt

    CreateProposalRequest:
      type: object
      properties:
        title:
          type: string
        clientName:
          type: string
        clientEmail:
          type: string
        templateId:
          type: integer

    UpdateProposalRequest:
      type: object
      properties:
        title:
          type: string
        clientName:
          type: string
        clientEmail:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ProposalSection"
        branding:
          $ref: "#/components/schemas/ProposalBranding"
        parties:
          $ref: "#/components/schemas/ProposalParties"
        totalValue:
          type: number

    SendProposalRequest:
      type: object
      properties:
        clientEmail:
          type: string
        personalMessage:
          type: string
      required:
        - clientEmail

    RespondToProposalRequest:
      type: object
      properties:
        action:
          type: string
          enum: [accept, decline]
        signerEmail:
          type: string
          format: email
          maxLength: 320
        signingToken:
          type: string
          minLength: 1
          maxLength: 256
        signerName:
          type: string
          minLength: 1
          maxLength: 160
        initials:
          type: string
          minLength: 1
          maxLength: 5
        signatureDataUrl:
          type: string
          maxLength: 500000
          pattern: "^data:image/png;base64,"
        termsAccepted:
          type: boolean
      required:
        - action

    CreateTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/TemplateCategory"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ProposalSection"
        designSettings:
          $ref: "#/components/schemas/DocumentDesignSettings"
        sourceProposalId:
          type: integer
      required:
        - name
        - category

    UpdateTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/TemplateCategory"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ProposalSection"
        designSettings:
          $ref: "#/components/schemas/DocumentDesignSettings"

    CopyTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/TemplateCategory"
