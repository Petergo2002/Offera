kind = "web"
previewPath = "/"
title = "Offera — Proposal Builder"
version = "1.0.0"
id = "artifacts/offera"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25570

[services.development]
run = "pnpm --filter @workspace/offera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/offera", "run", "build" ]
publicDir = "artifacts/offera/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25570"
BASE_PATH = "/"
